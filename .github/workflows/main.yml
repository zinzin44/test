name: Windows-RDP-Safe-Shield-Final
on:
  workflow_dispatch:
    inputs:
      auth_key_b64:
        description: 'Key (4x Base64)'
        required: true
      rdp_password_b64:
        description: 'Password (4x Base64)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 🔐 Security Handshake & Masking
        shell: pwsh
        env:
          START_KEY: ${{ secrets.MY_START_KEY }}
        run: |
          function Decode-Quad ($s) {
            $curr = $s.Trim()
            for ($i=0; $i -lt 4; $i++) { 
              $curr = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($curr)).Trim() 
            }
            return $curr
          }

          # فك تشفير المفتاح السري وكلمة المرور
          $k = Decode-Quad "${{ github.event.inputs.auth_key_b64 }}"
          
          if ($k -eq $env:START_KEY) {
            $p = Decode-Quad "${{ github.event.inputs.rdp_password_b64 }}"
            
            # منع ظهور كلمة السر في السجلات (Masking)
            Write-Host "::add-mask::$p"
            
            # تخزينها في بيئة العمل لاستخدامها لاحقاً
            echo "RDP_PASS=$p" >> $env:GITHUB_ENV
            Write-Host "✅ Authentication Successful. Sensitive data masked."
          } else { 
            Write-Host "❌ Security Breach: Invalid Key."
            exit 1 
          }

      - name: 🛠️ Configure Windows RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          $pass = $env:RDP_PASS
          net user GhostAdmin $pass /add
          net localgroup administrators GhostAdmin /add
          Write-Host "✅ RDP and User 'GhostAdmin' are ready."

      - name: 🌐 Secure Tunnel & Telegram Notification
        shell: pwsh
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # تحميل أداة التفق (Tunnel)
          curl -L --output cf.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          
          # تشغيل النفق
          Start-Process ./cf.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "log.txt"
          
          Write-Host "Initializing secure tunnel... (20s)"
          Start-Sleep -Seconds 20
          
          $log = Get-Content "log.txt"
          $raw = $log | Select-String "https://[a-z0-9-]+.trycloudflare.com"
          
          if ($raw) {
            $url = $raw.Matches[0].Value
            # إخفاء الرابط من السجل لزيادة الأمان
            Write-Host "::add-mask::$url"

            # تحضير رسالة التليجرام بتنسيق HTML الآمن
            $message = "🚀 <b>New RDP Session Ready!</b>`n`n" +
                       "🌐 <b>URL:</b> <code>$url</code>`n" +
                       "👤 <b>User:</b> <code>GhostAdmin</code>`n" +
                       "🔑 <b>Pass:</b> <code>$env:RDP_PASS</code>"
            
            $tgUrl = "https://api.telegram.org/bot$env:TG_TOKEN/sendMessage"
            
            # إرسال البيانات باستخدام JSON لضمان قبول الـ Chat ID والأرقام الكبيرة
            $params = @{
                chat_id = [string]$env:TG_CHAT_ID
                text = $message
                parse_mode = "HTML"
            }
            $jsonPayload = $params | ConvertTo-Json -Compress
            
            try {
                Invoke-RestMethod -Uri $tgUrl -Method Post -ContentType "application/json; charset=utf-8" -Body $jsonPayload
                Write-Host "----------------------------------------------"
                Write-Host "✅ SUCCESS: Credentials sent to your Telegram."
                Write-Host "----------------------------------------------"
            } catch {
                Write-Host "❌ Telegram Error: $($_.Exception.Message)"
                exit 1
            }
          } else {
            Write-Host "❌ Failed to generate tunnel. Log content:"
            Get-Content "log.txt"
            exit 1
          }

      - name: ⏳ Maintenance Loop (6 Hours)
        shell: pwsh
        run: |
          Write-Host "Session is active. Monitor your Telegram for connection updates."
          for ($i=1; $i -le 360; $i++) {
            Start-Sleep -Seconds 60
          }
