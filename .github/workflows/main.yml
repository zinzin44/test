name: Windows-RDP-Ghost-Extreme-v4
on:
  workflow_dispatch:
    inputs:
      auth_key_b64:
        description: 'Key (4x Base64)'
        required: true
      rdp_password_b64:
        description: 'Password (4x Base64)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Decode and Auth
        shell: pwsh
        run: |
          function Decode-Quad ($s) {
            $curr = $s.Trim()
            for ($i=0; $i -lt 4; $i++) { $curr = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($curr)).Trim() }
            return $curr
          }
          $k = Decode-Quad "${{ github.event.inputs.auth_key_b64 }}"
          if ($k -eq "${{ secrets.MY_START_KEY }}") {
            $p = Decode-Quad "${{ github.event.inputs.rdp_password_b64 }}"
            echo "RDP_PASS=$p" >> $env:GITHUB_ENV
          } else { exit 1 }

      - name: Setup RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user GhostAdmin "${{ env:RDP_PASS }}" /add
          net localgroup administrators GhostAdmin /add

      - name: Start Tunnel (TCP Mode)
        shell: pwsh
        run: |
          curl -L --output cf.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          # تشغيل النفق بنمط TCP صريح
          Start-Process ./cf.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "log.txt"
          
          Start-Sleep -Seconds 10
          $raw = Get-Content "log.txt" | Select-String "https://.*\.trycloudflare\.com"
          if ($raw) {
            $url = $raw.Matches[0].Value
            $enc = $url
            for ($i=0; $i -lt 4; $i++) { $enc = [System.Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($enc)) }
            Write-Host "--------------------------"
            Write-Host "ENCODED_URL: $enc"
            Write-Host "--------------------------"
          }
          
          # إبقاء السيرفر حي
          while($true) { Start-Sleep -Seconds 60 }
