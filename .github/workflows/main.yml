name: Windows-RDP-Ghost-Extreme-Final-Fixed
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 🔐 Authenticate and Mask
        shell: pwsh
        env:
          # نستخدم الأسرار فقط هنا
          START_KEY: ${{ secrets.MY_START_KEY }}
          # إذا لم تكن قد وضعت كلمة سر في الأسرار، سيستخدم القيمة الافتراضية القوية أدناه
          RDP_PASS_SECRET: ${{ secrets.RDP_PASSWORD }}
        run: |
          # التحقق من وجود المفتاح السري
          if ([string]::IsNullOrWhiteSpace($env:START_KEY)) {
            Write-Host "❌ Error: MY_START_KEY is missing in Secrets."
            exit 1
          }

          # تعيين كلمة السر (الأولوية للسكرت، ثم الافتراضية)
          $p = $env:RDP_PASS_SECRET
          if ([string]::IsNullOrWhiteSpace($p)) { $p = "Ghost@Admin#2026!X" }

          # إخفاء كلمة السر فوراً (هذا ما يمنع طباعتها)
          Write-Host "::add-mask::$p"
          
          # تصديرها للبيئة
          echo "RDP_PASS=$p" >> $env:GITHUB_ENV
          Write-Host "✅ Verified and Masked."

      - name: 🛠️ Setup RDP User
        shell: pwsh
        run: |
          # تفعيل الـ RDP بنفس طريقتك الأصلية الناجحة
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          $pass = $env:RDP_PASS
          net user GhostAdmin $pass /add
          net localgroup administrators GhostAdmin /add
          Write-Host "✅ User Created."

      - name: 🌐 Launch Cloudflare Tunnel (Original Mode)
        shell: pwsh
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # تحميل النسخة المستقرة
          curl -L --output cf.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          
          # تشغيل النفق بنفس الطريقة التي نجحت معك في كودك الأول
          # قمت بإضافة -RedirectStandardError لضمان قراءة الرابط
          Start-Process ./cf.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "log.txt"
          
          Write-Host "Waiting for tunnel initialization..."
          Start-Sleep -Seconds 20
          
          $log = Get-Content "log.txt"
          $raw = $log | Select-String "https://[a-z0-9-]+.trycloudflare.com"
          
          if ($raw) {
            $url = $raw.Matches[0].Value
            Write-Host "::add-mask::$url"
            
            # إرسال البيانات لتليجرام (بدون طباعتها في السجلات)
            $message = "🚀 <b>RDP Connection Ready!</b>`n`n" +
                       "🌐 <b>Host:</b> <code>$url</code>`n" +
                       "👤 <b>User:</b> <code>GhostAdmin</code>`n" +
                       "🔑 <b>Pass:</b> <code>$env:RDP_PASS</code>"
            
            $params = @{ chat_id = [string]$env:TG_CHAT_ID; text = $message; parse_mode = "HTML" }
            $jsonPayload = $params | ConvertTo-Json -Compress
            Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TG_TOKEN/sendMessage" -Method Post -ContentType "application/json" -Body $jsonPayload
            
            Write-Host "✅ Connection info sent. Logs are clean."
          } else {
            Write-Host "❌ Failed to get URL. Log content:"
            Get-Content "log.txt"
            exit 1
          }

      - name: ⏳ Maintenance
        shell: pwsh
        run: |
          for ($i=1; $i -le 360; $i++) { Start-Sleep -Seconds 60 }
