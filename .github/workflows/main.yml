name: Windows-RDP-Ghost-Extreme-v4
on:
  workflow_dispatch:
    inputs:
      auth_key_b64:
        description: 'أدخل مفتاح التشغيل (مشفر 4 مرات)'
        required: true
      rdp_password_b64:
        description: 'أدخل كلمة سر الـ RDP (مشفرة 4 مرات)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: فك التشفير والتحقق من الهوية
        shell: pwsh
        run: |
          function Decode-Quad ($inputString) {
              $current = $inputString.Trim()
              for ($i = 0; $i -lt 4; $i++) {
                  $current = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($current)).Trim()
              }
              return $current
          }
          try {
              $decoded_key = Decode-Quad "${{ github.event.inputs.auth_key_b64 }}"
              $decoded_pass = Decode-Quad "${{ github.event.inputs.rdp_password_b64 }}"
              if ($decoded_key -eq "${{ secrets.MY_START_KEY }}") {
                  Write-Host "✅ تم التحقق من الهوية" -ForegroundColor Green
                  echo "RDP_PASS=$decoded_pass" >> $env:GITHUB_ENV
              } else { exit 1 }
          } catch { exit 1 }

      - name: تحميل Cloudflared وإعداد RDP
        run: |
          curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0

      - name: إنشاء المستخدم
        run: |
          $name = "GhostAdmin"
          $pass = $env:RDP_PASS
          net user $name $pass /add
          net localgroup administrators $name /add

      - name: اقتناص وتشفير الرابط فوراً
        shell: pwsh
        run: |
          Write-Host "جاري بدء النفق واقتناص الرابط... يرجى الانتظار" -ForegroundColor Cyan
          
          # تشغيل النفق والتقاط مخرجات الأخطاء مباشرة
          $processInfo = New-Object System.Diagnostics.ProcessStartInfo
          $processInfo.FileName = "./cloudflared.exe"
          $processInfo.Arguments = "tunnel --url rdp://localhost:3389 --protocol http2"
          $processInfo.RedirectStandardError = $true
          $processInfo.UseShellExecute = $false
          $process = [System.Diagnostics.Process]::Start($processInfo)
          
          $raw_url = ""
          $timeout = Get-Date

          # مراقبة المخرجات سطراً بسطر حتى نجد الرابط
          while (!$process.HasExited) {
              $line = $process.StandardError.ReadLine()
              # ابحث عن نمط الرابط في السطر الحالي
              if ($line -match "https://[a-z0-9-]+\.trycloudflare\.com") {
                  $raw_url = $matches[0]
                  
                  # تشفير الرابط 4 مرات فوراً في الذاكرة
                  $current_url = $raw_url.Trim()
                  for ($i = 0; $i -lt 4; $i++) {
                      $current_url = [System.Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($current_url))
                  }
                  
                  Write-Host "----------------------------------------------" -ForegroundColor Cyan
                  Write-Host "✅ تم اقتناص الرابط وتشفيره بنجاح:" -ForegroundColor Green
                  Write-Host $current_url -ForegroundColor Yellow
                  Write-Host "----------------------------------------------" -ForegroundColor Cyan
                  break
              }
              
              # مخرج أمان بعد دقيقتين إذا لم يظهر الرابط
              if (((Get-Date) - $timeout).TotalSeconds -gt 120) {
                  Write-Host "❌ فشل الحصول على الرابط (Timeout)" -ForegroundColor Red
                  $process.Kill()
                  exit 1
              }
          }

      - name: إبقاء السيرفر يعمل
        run: |
          $n = 360
          while ($n -gt 0) {
            Write-Host "السيرفر يعمل... المتبقي: $n دقيقة"
            Start-Sleep -Seconds 60
            $n--
          }
