name: Windows-RDP-Ghost-Edition-V2
on:
  workflow_dispatch:
    inputs:
      auth_key_b64:
        description: 'أدخل مفتاح التشغيل (المشفر 4 مرات)'
        required: true
      rdp_password_b64:
        description: 'أدخل كلمة سر الـ RDP (المشفرة 4 مرات)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: فك التشفير الرباعي والتحقق (Quad-Base64 Decode)
        shell: pwsh
        run: |
          # وظيفة لفك التشفير 4 مرات
          function Decode-Quad ($inputString) {
              $current = $inputString.Trim()
              for ($i = 0; $i -lt 4; $i++) {
                  $current = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($current)).Trim()
              }
              return $current
          }

          try {
              $decoded_key = Decode-Quad "${{ github.event.inputs.auth_key_b64 }}"
              $decoded_pass = Decode-Quad "${{ github.event.inputs.rdp_password_b64 }}"
              
              $expected_key = "${{ secrets.MY_START_KEY }}".Trim()

              if ($decoded_key -eq $expected_key) {
                  Write-Host "✅ تم فك التشفير الرباعي بنجاح والمطابقة صحيحة!" -ForegroundColor Green
                  echo "RDP_PASS=$decoded_pass" >> $env:GITHUB_ENV
              } else {
                  Write-Host "❌ خطأ: المفتاح بعد فك التشفير لا يطابق المخزن في Secrets" -ForegroundColor Red
                  exit 1
              }
          } catch {
              Write-Host "❌ خطأ: فشل في فك التشفير. تأكد أنك شفرت النص 4 مرات بالضبط." -ForegroundColor Red
              exit 1
          }

      - name: تحميل وتنكر Cloudflared (فكرة 4 & 39)
        shell: pwsh
        run: |
          curl -L --output sys_driver.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe

      - name: إعداد المستخدم
        shell: pwsh
        run: |
          $name = "GhostAdmin"
          $pass = $env:RDP_PASS
          $secPassword = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $name -Password $secPassword -FullName "System Managed Account"
          Add-LocalGroupMember -Group "Administrators" -Member $name
          
          # تفعيل الـ RDP وتجاوز المصادقة
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0

      - name: تشغيل النفق واستخراج الرابط المشفر (فكرة 9 & 39)
        shell: pwsh
        run: |
          # التنكر بهوية متصفح Chrome
          $ua = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
          Start-Process ./sys_driver.exe -ArgumentList "tunnel --url rdp://localhost:3389 --http-header 'User-Agent: $ua'" -RedirectStandardError "logs.txt"
          
          Write-Host "جاري البحث عن الرابط..." -ForegroundColor Cyan
          Start-Sleep -Seconds 30
          
          $raw_url = Get-Content "logs.txt" | Select-String "https://.*trycloudflare.com" | ForEach-Object { $_.Matches.Value }
          
          if ($raw_url) {
              # تشفير الرابط الناتج (مرة واحدة فقط للسهولة) لتمويهه في الـ Logs
              $b64_url = [System.Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($raw_url))
              Write-Host "----------------------------------------------"
              Write-Host "رابط السيرفر (مشفر Base64):" -ForegroundColor Green
              Write-Host $b64_url -ForegroundColor Yellow
              Write-Host "----------------------------------------------"
          } else {
              Write-Host "لم يتم العثور على الرابط. تفقد سجلات logs.txt"
              Get-Content "logs.txt"
          }

      - name: المراقبة ومفتاح الإغلاق (فكرة 13)
        shell: pwsh
        run: |
          Write-Host "السيرفر يعمل. لإغلاقه، ضع كلمة STOP في ملف stop.txt بمستودعك."
          for ($i = 0; $i -lt 360; $i++) {
              if (Test-Path "stop.txt") {
                  if ((Get-Content "stop.txt").Trim() -eq "STOP") {
                      Write-Host "!! تم تفعيل مفتاح الإغلاق الذاتي !!" -ForegroundColor Red
                      exit 0
                  }
              }
              Start-Sleep -Seconds 60
          }
