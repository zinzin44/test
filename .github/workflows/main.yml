name: Establishing Stable Tunnel
        shell: pwsh
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -L --output cf.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          
          # استخدام بروتوكول quic لزيادة استقرار الرابط ومنع الخطأ 530
          Start-Process ./cf.exe -ArgumentList "tunnel --url tcp://localhost:3389 --protocol quic" -RedirectStandardError "log.txt"
          
          Write-Host "Waiting for tunnel propagation..."
          Start-Sleep -Seconds 40
          
          $log = Get-Content "log.txt"
          $raw = $log | Select-String "https://[a-z0-9-]+.trycloudflare.com"
          
          if ($raw) {
            $url = $raw.Matches[0].Value
            Write-Host "::add-mask::$url"
            
            # تنبيهك في الرسالة بطريقة الاتصال
            $message = "🚀 <b>RDP Tunnel Ready!</b>`n`n" +
                       "🌐 <b>Hostname:</b> <code>$url</code>`n" +
                       "👤 <b>User:</b> <code>GhostAdmin</code>`n" +
                       "🔑 <b>Pass:</b> <code>$env:RDP_PASS</code>`n`n" +
                       "📢 <b>How to connect:</b>`n" +
                       "Run this on your PC:`n" +
                       "<code>cloudflared access rdp --hostname $url --url localhost:3333</code>"
            
            $params = @{ chat_id = [string]$env:TG_CHAT_ID; text = $message; parse_mode = "HTML" }
            $jsonPayload = $params | ConvertTo-Json -Compress
            Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TG_TOKEN/sendMessage" -Method Post -ContentType "application/json" -Body $jsonPayload
          }
