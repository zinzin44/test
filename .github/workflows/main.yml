- name: تشغيل النفق واستخراج وتشفير الرابط
        shell: pwsh
        run: |
          Write-Host "جاري بدء تشغيل النفق (بروتوكول HTTP2)..." -ForegroundColor Cyan
          # تشغيل النفق في الخلفية مع توجيه الأخطاء للسجل
          Start-Process ./sys_driver.exe -ArgumentList "tunnel --url rdp://localhost:3389 --protocol http2" -RedirectStandardError "logs.txt"
          
          $raw_url = ""
          Write-Host "في انتظار توليد الرابط..." -ForegroundColor Yellow
          
          # حلقة البحث عن الرابط (بدون طباعته)
          for ($i = 0; $i -lt 24; $i++) {
              Start-Sleep -Seconds 5
              if (Test-Path "logs.txt") {
                  $logContent = Get-Content "logs.txt"
                  # استخراج الرابط وتخزينه في متغير فقط
                  $raw_url = $logContent | Select-String "https://[a-z0-9-]+\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
                  if ($raw_url) { break }
              }
          }

          if ($raw_url) {
              # تشفير الرابط 4 مرات سرّياً
              $current_url = $raw_url.Trim()
              for ($i = 0; $i -lt 4; $i++) {
                  $current_url = [System.Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($current_url))
              }
              
              # طباعة النتائج المشفرة فقط
              Write-Host "✅ تم توليد وتشفير الرابط بنجاح." -ForegroundColor Green
              Write-Host "----------------------------------------------" -ForegroundColor Cyan
              Write-Host "فك تشفير النص التالي (4 مرات) للحصول على الرابط:" -ForegroundColor White
              Write-Host $current_url -ForegroundColor Yellow
              Write-Host "----------------------------------------------" -ForegroundColor Cyan
              
              # مسح الرابط من الذاكرة لزيادة الأمان
              $raw_url = $null
          } else {
              Write-Host "❌ فشل استخراج الرابط. قد تكون هناك مشكلة في الاتصال." -ForegroundColor Red
              exit 1
          }
