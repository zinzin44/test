name: Windows-RDP-Safe-Shield
on:
  workflow_dispatch:
    inputs:
      auth_key_b64:
        description: 'Key (4x Base64)'
        required: true
      rdp_password_b64:
        description: 'Password (4x Base64)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Security Check & Decode
        shell: pwsh
        env:
          START_KEY: ${{ secrets.MY_START_KEY }}
        run: |
          function Decode-Quad ($s) {
            $curr = $s.Trim()
            for ($i=0; $i -lt 4; $i++) { 
                $curr = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($curr)).Trim() 
            }
            return $curr
          }

          $k = Decode-Quad "${{ github.event.inputs.auth_key_b64 }}"
          
          if ($k -eq $env:START_KEY) {
            $p = Decode-Quad "${{ github.event.inputs.rdp_password_b64 }}"
            # إخفاء كلمة السر فوراً من أي ظهور في السجلات
            Write-Host "::add-mask::$p"
            echo "RDP_PASS=$p" >> $env:GITHUB_ENV
            Write-Host "✅ Authentication Successful."
          } else {
            Write-Host "❌ Critical Error: Identity Verification Failed."
            exit 1
          }

      - name: Setup RDP Environment
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $pass = $env:RDP_PASS
          net user GhostAdmin $pass /add
          net localgroup administrators GhostAdmin /add
          Write-Host "✅ System environment prepared."

      - name: Launch Secure Tunnel
        shell: pwsh
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # تحميل Cloudflared
          curl -L --output cf.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          
          # تشغيل النفق
          Start-Process ./cf.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "log.txt"
          Write-Host "Waiting for tunnel to sync..."
          Start-Sleep -Seconds 20
          
          # استخراج الرابط
          $log = Get-Content "log.txt"
          $raw = $log | Select-String "https://[a-z0-9-]+.trycloudflare.com"
          
          if ($raw) {
            $url = $raw.Matches[0].Value
            Write-Host "::add-mask::$url" # إخفاء الرابط من السجل

            # إرسال البيانات إلى تليجرام
            $message = "🚀 *New RDP Session Ready!*`n`n" +
                       "🌐 *URL:* ``$url``" + "`n" +
                       "👤 *User:* ``GhostAdmin``" + "`n" +
                       "🔑 *Pass:* ``$env:RDP_PASS``"
            
            $tgUrl = "https://api.telegram.org/bot$env:TG_TOKEN/sendMessage"
            $body = @{ chat_id = $env:TG_CHAT_ID; text = $message; parse_mode = "MarkdownV2" }
            Invoke-RestMethod -Uri $tgUrl -Method Post -Body $body
            
            Write-Host "----------------------------------------------------"
            Write-Host "✅ ALL DONE! Check your Telegram for connection info."
            Write-Host "----------------------------------------------------"
          } else {
            Write-Host "❌ Failed to generate tunnel. Check cloudflared status."
            exit 1
          }

      - name: Keep Alive
        shell: pwsh
        run: |
          Write-Host "Server is active. Tunneling data to your Telegram..."
          for ($i=0; $i -lt 360; $i++) {
            Start-Sleep -Seconds 60
          }
