name: Windows-RDP-Final-Shield-V3
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 🔐 Secure Masking
        shell: pwsh
        env:
          MASTER_KEY: ${{ secrets.MY_START_KEY }}
          RDP_PASS_SECRET: ${{ secrets.RDP_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MASTER_KEY)) { exit 1 }
          $pass = $env:RDP_PASS_SECRET
          if ([string]::IsNullOrWhiteSpace($pass)) { $pass = "Ghost@Admin#2026!" }
          Write-Host "::add-mask::$pass"
          echo "RDP_PASS=$pass" >> $env:GITHUB_ENV

      - name: 🛠️ RDP & User Setup
        shell: pwsh
        run: |
          $name = "AdminUser"
          net user $name $env:RDP_PASS /add /Y
          net localgroup administrators $name /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0

      - name: 🌐 Launch Tunnel & Smart Extract
        shell: pwsh
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. تحميل الأداة
          curl -L --output cf.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          
          # 2. تشغيل النفق وتوجيه السجلات لملف نصي
          # استخدمنا rdp:// لضمان توافق البروتوكول
          Start-Process ./cf.exe -ArgumentList "tunnel --url rdp://localhost:3389" -RedirectStandardError "out.log"
          
          Write-Host "Waiting for Cloudflare to generate URL..."
          
          # 3. محاولة استخراج الرابط بذكاء (تكرار البحث كل 5 ثوانٍ حتى يظهر)
          $url = ""
          for ($i=0; $i -lt 12; $i++) {
              Start-Sleep -Seconds 5
              $log = Get-Content "out.log" -Raw
              if ($log -match "https://[a-z0-9-]+.trycloudflare.com") {
                  $url = $matches[0]
                  break
              }
              Write-Host "Still waiting... ($($i*5)s)"
          }

          if ($url) {
            Write-Host "::add-mask::$url"
            
            # 4. إرسال البيانات لتليجرام
            $message = "🚀 <b>RDP Connection Fixed!</b>`n`n" +
                       "🌐 <b>Host:</b> <code>$url</code>`n" +
                       "👤 <b>User:</b> <code>AdminUser</code>`n" +
                       "🔑 <b>Pass:</b> <code>$env:RDP_PASS</code>"
            
            $body = @{ chat_id = [string]$env:TG_CHAT_ID; text = $message; parse_mode = "HTML" } | ConvertTo-Json -Compress
            Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TG_TOKEN/sendMessage" -Method Post -ContentType "application/json" -Body $body
            
            Write-Host "✅ Success! Link sent to Telegram."
          } else {
            Write-Host "❌ Failed to capture URL. Full Log below:"
            Get-Content "out.log"
            exit 1
          }

      - name: ⏳ Persistent Session
        run: |
          for ($i=360; $i -gt 0; $i--) { Write-Host "Active: $i min" ; Start-Sleep -Seconds 60 }
