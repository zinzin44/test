name: Windows-RDP-Ghost-Extreme-v4
on:
  workflow_dispatch:
    inputs:
      auth_key_b64:
        description: 'أدخل مفتاح التشغيل (مشفر 4 مرات)'
        required: true
      rdp_password_b64:
        description: 'أدخل كلمة سر الـ RDP (مشفرة 4 مرات)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: فك التشفير الرباعي للمفاتيح
        shell: pwsh
        run: |
          function Decode-Quad ($inputString) {
              $current = $inputString.Trim()
              for ($i = 0; $i -lt 4; $i++) {
                  $current = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($current)).Trim()
              }
              return $current
          }
          try {
              $decoded_key = Decode-Quad "${{ github.event.inputs.auth_key_b64 }}"
              $decoded_pass = Decode-Quad "${{ github.event.inputs.rdp_password_b64 }}"
              if ($decoded_key -eq "${{ secrets.MY_START_KEY }}") {
                  Write-Host "✅ تم التحقق من الهوية" -ForegroundColor Green
                  Add-Content -Path $env:GITHUB_ENV -Value "RDP_PASS=$decoded_pass"
              } else {
                  Write-Host "❌ خطأ في المطابقة" -ForegroundColor Red
                  exit 1
              }
          } catch {
              Write-Host "❌ فشل فك التشفير" -ForegroundColor Red
              exit 1
          }

      - name: تحميل وتنكر الأداة
        shell: pwsh
        run: |
          curl -L --output sys_driver.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe

      - name: إعداد المستخدم والأمان
        shell: pwsh
        run: |
          $name = "GhostAdmin"
          $pass = $env:RDP_PASS
          $secPassword = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $name -Password $secPassword -FullName "System Managed Account"
          Add-LocalGroupMember -Group "Administrators" -Member $name
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0

      - name: تشغيل النفق واستخراج الرابط (الآلية المطورة)
        shell: pwsh
        run: |
          Write-Host "جاري بدء تشغيل النفق واستخراج الرابط سرياً..." -ForegroundColor Cyan
          
          # تشغيل العملية والبدء في مراقبة مخرجاتها فوراً
          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = "./sys_driver.exe"
          $psi.Arguments = "tunnel --url rdp://localhost:3389 --protocol http2"
          $psi.RedirectStandardError = $true
          $psi.UseShellExecute = $false
          $process = [System.Diagnostics.Process]::Start($psi)
          
          $raw_url = ""
          $timeout = Get-Date
          $found = $false

          # قراءة مخرجات الخطأ (حيث يطبع cloudflared الرابط) سطراً بسطر
          while (!$process.HasExited -and !$found) {
              $line = $process.StandardError.ReadLine()
              if ($line -match "https://[a-z0-9-]+\.trycloudflare\.com") {
                  $raw_url = $matches[0]
                  $found = $true
              }
              # مؤقت أمان لمدة دقيقتين لمنع التعليق اللانهائي
              if (((Get-Date) - $timeout).TotalSeconds -gt 90) { break }
          }

          if ($found) {
              # تشفير الرابط 4 مرات
              $current_url = $raw_url.Trim()
              for ($i = 0; $i -lt 4; $i++) {
                  $current_url = [System.Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($current_url))
              }
              
              Write-Host "----------------------------------------------"
              Write-Host "✅ تمت العملية بنجاح." -ForegroundColor Green
              Write-Host "فك تشفير النص التالي (4 مرات) للحصول على الرابط:" -ForegroundColor White
              Write-Host "----------------------------------------------"
              Write-Host $current_url -ForegroundColor Yellow
              Write-Host "----------------------------------------------"
          } else {
              Write-Host "❌ فشل استخراج الرابط أو تجاوز الوقت المسموح." -ForegroundColor Red
              exit 1
          }

      - name: المراقبة ومفتاح الإغلاق
        shell: pwsh
        run: |
          Write-Host "🚀 السيرفر نشط الآن. للإغلاق، أضف STOP داخل ملف stop.txt"
          for ($i = 0; $i -lt 360; $i++) {
              if (Test-Path "stop.txt") {
                  if ((Get-Content "stop.txt").Trim() -eq "STOP") { break }
              }
              Start-Sleep -Seconds 60
          }
