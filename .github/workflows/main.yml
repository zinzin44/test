name: Windows-RDP-Ghost-Extreme-v4-Secure
on:
  workflow_dispatch:
    inputs:
      auth_key_b64:
        description: 'Key (4x Base64)'
        required: true
      rdp_password_b64:
        description: 'Password (4x Base64)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 🔐 Decode and Masking
        shell: pwsh
        env:
          START_KEY: ${{ secrets.MY_START_KEY }}
        run: |
          function Decode-Quad ($s) {
            $curr = $s.Trim()
            for ($i=0; $i -lt 4; $i++) { 
              $curr = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($curr)).Trim() 
            }
            return $curr
          }

          # فك تشفير المفتاح وكلمة المرور
          $k = Decode-Quad "${{ github.event.inputs.auth_key_b64 }}"
          
          if ($k -eq $env:START_KEY) {
            $p = Decode-Quad "${{ github.event.inputs.rdp_password_b64 }}"
            
            # أمر سحري: إخفاء كلمة السر من سجلات GitHub تماماً
            Write-Host "::add-mask::$p"
            
            # حفظ كلمة السر في بيئة العمل لاستخدامها في الخطوات القادمة
            echo "RDP_PASS=$p" >> $env:GITHUB_ENV
            Write-Host "✅ Key Verified. Sensitive data is now masked."
          } else { 
            Write-Host "❌ Invalid Key. Security Termination."
            exit 1 
          }

      - name: 🛠️ Setup Windows RDP
        shell: pwsh
        run: |
          # تفعيل سطح المكتب البعيد
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # إنشاء المستخدم بصلاحيات الأدمن
          $pass = $env:RDP_PASS
          net user GhostAdmin $pass /add
          net localgroup administrators GhostAdmin /add
          Write-Host "✅ User 'GhostAdmin' created successfully."

      - name: 🌐 Start Tunnel & Notify Telegram
        shell: pwsh
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # تحميل أداة Cloudflared
          curl -L --output cf.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          
          # تشغيل النفق وتحويل الأخطاء لملف نصي لاستخراج الرابط
          Start-Process ./cf.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "log.txt"
          
          Write-Host "Waiting for tunnel to initialize (20s)..."
          Start-Sleep -Seconds 20
          
          $log = Get-Content "log.txt"
          $raw = $log | Select-String "https://[a-z0-9-]+.trycloudflare.com"
          
          if ($raw) {
            $url = $raw.Matches[0].Value
            # إخفاء الرابط من السجلات لزيادة الأمان
            Write-Host "::add-mask::$url"

            # تجهيز رسالة التليجرام بتنسيق HTML
            $message = "🚀 <b>New RDP Session Ready!</b>`n`n" +
                       "🌐 <b>URL:</b> <code>$url</code>`n" +
                       "👤 <b>User:</b> <code>GhostAdmin</code>`n" +
                       "🔑 <b>Pass:</b> <code>$env:RDP_PASS</code>"
            
            $tgUrl = "https://api.telegram.org/bot$env:TG_TOKEN/sendMessage"
            
            # إرسال البيانات كـ JSON لضمان عدم حدوث أخطاء في الرموز الخاصة
            $params = @{
                chat_id = $env:TG_CHAT_ID
                text = $message
                parse_mode = "HTML"
            }
            $jsonPayload = $params | ConvertTo-Json -Compress
            
            Invoke-RestMethod -Uri $tgUrl -Method Post -ContentType "application/json; charset=utf-8" -Body $jsonPayload
            
            Write-Host "----------------------------------------------"
            Write-Host "✅ SUCCESS: Connection info sent to Telegram."
            Write-Host "----------------------------------------------"
          } else {
            Write-Host "❌ Failed to get tunnel URL. Tunnel might have crashed."
            exit 1
          }

      - name: ⏳ Keep Alive (6 Hours)
        shell: pwsh
        run: |
          Write-Host "Server is running... You can connect now."
          for ($i=1; $i -le 360; $i++) {
            Write-Host "Active Session... Minute: $i"
            Start-Sleep -Seconds 60
          }
