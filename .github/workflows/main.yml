name: bbbbbb
        shell: pwsh
        run: |
          # تشغيل النفق
          $process = Start-Process ./sys_driver.exe -ArgumentList "tunnel --url rdp://localhost:3389 --protocol http2" -RedirectStandardError "logs.txt" -PassThru
          
          Write-Host "جاري توليد الرابط وتشفيره سرياً..." -ForegroundColor Cyan
          $raw_url = ""
          
          # محاولة استخراج الرابط لمدة دقيقة ونصف
          for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 3
              if (Test-Path "logs.txt") {
                  try {
                      # استخدام -ErrorAction SilentlyContinue للقراءة حتى لو الملف مفتوح
                      $logContent = Get-Content "logs.txt" -ErrorAction SilentlyContinue
                      $raw_url = $logContent | Select-String "https://[a-z0-9-]+\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
                      if ($raw_url) { break }
                  } catch { }
              }
          }
          
          if ($raw_url) {
              # التشفير الرباعي
              $current_url = $raw_url.Trim()
              for ($i = 0; $i -lt 4; $i++) {
                  $current_url = [System.Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($current_url))
              }
              
              Write-Host "----------------------------------------------"
              Write-Host "✅ تمت العملية بنجاح." -ForegroundColor Green
              Write-Host "فك تشفير النص التالي (4 مرات) للحصول على الرابط:" -ForegroundColor White
              Write-Host "----------------------------------------------"
              Write-Host $current_url -ForegroundColor Yellow
              Write-Host "----------------------------------------------"
              
              # بدلاً من حذف الملف، نقوم بتفريغه فقط لتجنب خطأ Permission Denied
              Clear-Content "logs.txt" -ErrorAction SilentlyContinue
          } else {
              Write-Host "❌ فشل استخراج الرابط. السجلات الحالية:" -ForegroundColor Red
              Get-Content "logs.txt" -ErrorAction SilentlyContinue
              exit 1
          }
