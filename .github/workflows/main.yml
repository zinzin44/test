name: Windows-RDP-Ghost-Pro-Final-Shield
on:
  workflow_dispatch:
    inputs:
      auth_key_b64:
        description: 'Key (4x Base64)'
        required: true
      rdp_password_b64:
        description: 'Password (4x Base64)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 🛡️ Total Stealth Initialization
        shell: pwsh
        # السر هنا: تمرير المدخلات كمتغيرات بيئة في هذا القسم يمنع GitHub من طباعتها داخل "نص الكود"
        env:
          INPUT_AUTH: ${{ github.event.inputs.auth_key_b64 }}
          INPUT_PASS: ${{ github.event.inputs.rdp_password_b64 }}
        run: |
          # 1. القنص الفوري للمدخلات قبل أي عملية أخرى
          Write-Host "::add-mask::$env:INPUT_AUTH"
          Write-Host "::add-mask::$env:INPUT_PASS"
          
          # 2. نقل القيم إلى ملف البيئة العالمي لاستخدامها لاحقاً بشكل آمن
          echo "SHADOW_AUTH=$env:INPUT_AUTH" >> $env:GITHUB_ENV
          echo "SHADOW_PASS=$env:INPUT_PASS" >> $env:GITHUB_ENV
          
          Write-Host "🛡️ All inputs have been shielded and converted to stars (***)."

      - name: 🔐 Secure Decoding
        shell: pwsh
        env:
          START_KEY: ${{ secrets.MY_START_KEY }}
        run: |
          function Decode-Quad ($s) {
            $curr = $s.Trim()
            for ($i=0; $i -lt 4; $i++) { 
              $curr = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($curr)).Trim() 
            }
            return $curr
          }

          # هنا نستخدم متغيرات الظل (ستظهر كنجوم في السجلات)
          $k = Decode-Quad $env:SHADOW_AUTH
          
          if ($k -eq $env:START_KEY) {
            $p = Decode-Quad $env:SHADOW_PASS
            Write-Host "::add-mask::$p"
            echo "RDP_PASS=$p" >> $env:GITHUB_ENV
            Write-Host "✅ Identity Verified. Full Stealth Active."
          } else { 
            Write-Host "❌ Security Breach!"
            exit 1 
          }

      - name: 🛠️ Setup Windows RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $pass = $env:RDP_PASS
          net user GhostAdmin $pass /add
          net localgroup administrators GhostAdmin /add

      - name: 🌐 Secure Tunnel & Telegram
        shell: pwsh
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -L --output cf.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          Start-Process ./cf.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "log.txt"
          Start-Sleep -Seconds 20
          $log = Get-Content "log.txt"
          $raw = $log | Select-String "https://[a-z0-9-]+.trycloudflare.com"
          
          if ($raw) {
            $url = $raw.Matches[0].Value
            Write-Host "::add-mask::$url"
            $message = "🚀 <b>RDP Ready!</b>`n`n🌐 <b>Host:</b> <code>$url</code>`n👤 <b>User:</b> <code>GhostAdmin</code>`n🔑 <b>Pass:</b> <code>$env:RDP_PASS</code>"
            $params = @{ chat_id = [string]$env:TG_CHAT_ID; text = $message; parse_mode = "HTML" }
            $jsonPayload = $params | ConvertTo-Json -Compress
            Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TG_TOKEN/sendMessage" -Method Post -ContentType "application/json" -Body $jsonPayload
            Write-Host "✅ Notification Sent Privately."
          }

      - name: ⏳ Maintenance Loop
        shell: pwsh
        run: |
          Write-Host "Session is running. Logs are completely clean."
          for ($i=1; $i -le 360; $i++) { Start-Sleep -Seconds 60 }
