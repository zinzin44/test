name: Windows-RDP-Ghost-Ultimate-Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 🔐 Secure Access Verification
        shell: pwsh
        env:
          # نستخدم مفتاحاً واحداً فقط مخزناً في Secrets
          # إذا تطابق المفتاح الذي تضعه هنا مع ما هو مخزن، سيعمل الكود
          MASTER_KEY: ${{ secrets.MY_START_KEY }}
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }} # كلمة السر صريحة في السكرت (هي مخفية أصلاً)
        run: |
          # التحقق من وجود المفتاح (لحماية المستودع من التشغيل العشوائي)
          if ($env:MASTER_KEY -ne $null -and $env:MASTER_KEY -ne "") {
            
            # إخفاء كلمة السر فوراً (رغم أنها secret، هذا أمان إضافي)
            Write-Host "::add-mask::$env:RDP_PASSWORD"
            
            echo "RDP_PASS=$env:RDP_PASSWORD" >> $env:GITHUB_ENV
            Write-Host "✅ Access Granted. Stealth session starting..."
          } else { 
            Write-Host "❌ Access Denied: MASTER_KEY not found in Secrets."
            exit 1 
          }

      - name: 🛠️ Setup Environment
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $pass = $env:RDP_PASS
          net user GhostAdmin $pass /add
          net localgroup administrators GhostAdmin /add

      - name: 🌐 Private Tunnel & Telegram
        shell: pwsh
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -L --output cf.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          Start-Process ./cf.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "log.txt"
          
          Start-Sleep -Seconds 20
          $log = Get-Content "log.txt"
          $raw = $log | Select-String "https://[a-z0-9-]+.trycloudflare.com"
          
          if ($raw) {
            $url = $raw.Matches[0].Value
            Write-Host "::add-mask::$url"
            
            $message = "🚀 <b>Ghost Session Active</b>`n`n🌐 <b>Host:</b> <code>$url</code>`n👤 <b>User:</b> <code>GhostAdmin</code>`n🔑 <b>Pass:</b> <code>$env:RDP_PASS</code>"
            $params = @{ chat_id = [string]$env:TG_CHAT_ID; text = $message; parse_mode = "HTML" }
            $jsonPayload = $params | ConvertTo-Json -Compress
            Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TG_TOKEN/sendMessage" -Method Post -ContentType "application/json" -Body $jsonPayload
          }

      - name: ⏳ Maintenance Mode
        shell: pwsh
        run: |
          Write-Host "Server is live. Everything is hidden and secured."
          for ($i=1; $i -le 360; $i++) { Start-Sleep -Seconds 60 }
