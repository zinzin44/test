name: 🌐 4. تشغيل النفق وإرسال البيانات لتلجرام
  shell: pwsh
  env:
    TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
    TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  run: |

    Start-Process ./cloudflared.exe `
      -ArgumentList "tunnel --url tcp://localhost:3389 --no-autoupdate" `
      -RedirectStandardOutput "logs.txt" `
      -RedirectStandardError "err.txt"

    Write-Host "⏳ جاري استخراج الرابط..."

    $url = ""

    for ($i=1; $i -le 20; $i++) {
        Start-Sleep -Seconds 3

        if (Test-Path "logs.txt") {

            $content = Get-Content "logs.txt" -Raw

            if ($content -match "https://[a-zA-Z0-9-]+\.trycloudflare\.com") {

                $url = $matches[0]
                break
            }
        }
    }

    if ($url) {

        $host = $url.Replace("https://","")

        $message = @"
🚀 RDP READY

Host:
$host

User:
AdminUser

Password:
$env:RDP_PASS

Run locally:

cloudflared tunnel --url tcp://localhost:3390 --hostname $host

Then connect using:
localhost:3390
"@

        $body = @{
            chat_id = "$env:TG_CHAT_ID"
            text = $message
        }

        Invoke-RestMethod `
          -Uri "https://api.telegram.org/bot$env:TG_TOKEN/sendMessage" `
          -Method Post `
          -Body $body

        Write-Host "✅ الرابط جاهز: $url"

    } else {

        Write-Host "❌ لم يتم العثور على الرابط"
        Get-Content err.txt
        exit 1
    }
