name: Windows-RDP-Ghost-Extreme-v4
on:
  workflow_dispatch:
    inputs:
      auth_key:
        description: 'Enter Authorization Key'
        required: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Verify Key and Setup Environment
        shell: pwsh
        run: |
          # التحقق من المفتاح المدخل مقارنة بالسكرت المخزن
          if ("${{ github.event.inputs.auth_key }}" -eq "${{ secrets.MY_START_KEY }}") {
            Write-Host "✅ Key Verified Successfully."
            # إضافة كلمة السر لبيئة العمل من الـ Secrets مباشرة
            # ملاحظة: GitHub سيقوم بإخفائها تلقائياً في الـ Logs
            echo "RDP_PASS=${{ secrets.RDP_PASSWORD }}" >> $env:GITHUB_ENV
          } else {
            Write-Host "❌ Invalid Key. Access Denied."
            exit 1
          }

      - name: Setup RDP and User
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # استدعاء كلمة السر من بيئة العمل
          $pass = $env:RDP_PASS
          net user GhostAdmin $pass /add
          net localgroup administrators GhostAdmin /add

      - name: Start Tunnel (TCP Mode)
        shell: pwsh
        run: |
          curl -L --output cf.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
          
          # تشغيل النفق
          Start-Process ./cf.exe -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "log.txt"
          
          Write-Host "Waiting for tunnel to initialize..."
          Start-Sleep -Seconds 15
          
          $log = Get-Content "log.txt"
          $raw = $log | Select-String "https://[a-z0-9-]+.trycloudflare.com"
          
          if ($raw) {
            $url = $raw.Matches[0].Value
            Write-Host "----------------------------------------------"
            Write-Host "✅ RDP ADDRESS:"
            Write-Host $url -ForegroundColor Yellow
            Write-Host "----------------------------------------------"
          } else {
            Write-Host "❌ Failed to get tunnel URL."
            exit 1
          }
          
          # إبقاء المهمة تعمل (تم تقليل الـ Logs لتجنب كشف أي معلومات)
          for ($i=1; $i -le 360; $i++) {
            Write-Host "Server Heartbeat... Minute: $i"
            Start-Sleep -Seconds 60
          }
